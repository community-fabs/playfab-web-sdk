name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      build_tag:
        description: "Build Tag"
        required: true
        default: "latest"

permissions:
  id-token: write
  contents: read

env:
  BUILD_TAG: ${{ github.event.inputs.build_tag }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Registry Settings
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build:sdk

      - name: Run unit tests
        run: npm run test

      - name: Publish
        run: npm publish --access public --tag ${BUILD_TAG}
